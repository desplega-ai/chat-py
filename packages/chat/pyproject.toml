[project]
name = "chat-py"
version = "0.1.0"
description = "Unified chat SDK for building bots across Slack, Teams, Google Chat, Discord, Telegram, GitHub, Linear, and WhatsApp — Python port of vercel/chat"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.13"
authors = [
    { name = "Desplega Labs", email = "hello@desplega.ai" },
]
keywords = ["chat", "bot", "slack", "teams", "discord", "google-chat", "telegram", "github", "linear", "whatsapp"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
]
dependencies = ["mistune>=3.0", "typing-extensions>=4.12"]

[project.urls]
Homepage = "https://github.com/desplega-ai/chat-py"
Repository = "https://github.com/desplega-ai/chat-py"
Issues = "https://github.com/desplega-ai/chat-py/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/chat"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests", "src"]
