[project]
name = "chat-py-integration-tests"
version = "0.1.0"
description = "Integration tests for chat-py (replay fixtures + live tests)"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.13"
authors = [
    { name = "Desplega Labs", email = "hello@desplega.ai" },
]
keywords = ["chat", "bot", "slack", "teams", "discord", "google-chat", "telegram", "github", "linear", "whatsapp"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
]
dependencies = ["chat-py", "chat-py-adapter-shared", "chat-py-adapter-slack", "chat-py-adapter-discord", "chat-py-adapter-teams", "chat-py-adapter-gchat", "chat-py-adapter-telegram", "chat-py-adapter-github", "chat-py-adapter-linear", "chat-py-adapter-whatsapp", "chat-py-adapter-state-memory", "chat-py-adapter-state-redis", "chat-py-adapter-state-pg", "pytest>=8.3", "pytest-asyncio>=0.24", "respx>=0.21"]

[project.urls]
Homepage = "https://github.com/desplega-ai/chat-py"
Repository = "https://github.com/desplega-ai/chat-py"
Issues = "https://github.com/desplega-ai/chat-py/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/chat_integration_tests"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests", "src"]
